{% extends "base.html" %}
{% block title %}Register Officer — Traffic FMIS{% endblock %}

{% block content %}
<div class="page-header">
    <h2>➕ Register New Officer</h2>
    <a href="{{ url_for('admin.officers') }}" class="btn btn-outline">← Back to Officers</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('auth.register_officer') }}">

        <h3 class="section-heading">Login Credentials</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="username">Username *</label>
                <input type="text" id="username" name="username" required
                       placeholder="e.g. officer_ahmed" minlength="3">
            </div>
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required
                       placeholder="officer@traffic.gov">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="password">Password * (min 6 chars)</label>
                <input type="password" id="password" name="password" required
                       minlength="6" placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
        <label for="role">Account Role *</label>
        <select id="role" name="role" required>
            <option value="officer">Traffic Officer</option>
            <option value="admin">Administrator</option>
        </select>
    </div>
        </div>

        <h3 class="section-heading">Officer Details</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="full_name">Full Name *</label>
                <input type="text" id="full_name" name="full_name" required
                       placeholder="Officer's full name">
            </div>
            <div class="form-group">
                <label for="badge_number">Badge Number *</label>
                <input type="text" id="badge_number" name="badge_number" required
                       placeholder="e.g. TRF-001">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" id="department" name="department"
                       placeholder="e.g. Traffic Enforcement">
            </div>
            <div class="form-group">
                <label for="precinct">Precinct</label>
                <input type="text" id="precinct" name="precinct"
                       placeholder="e.g. District South">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone"
                       placeholder="e.g. 0300-1234567">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">✅ Register Officer</button>
            <a href="{{ url_for('admin.officers') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
