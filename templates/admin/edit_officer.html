{% extends "base.html" %}
{% block title %}Edit Officer — Traffic FMIS{% endblock %}

{% block content %}
<div class="page-header">
    <h2>✏️ Edit Officer</h2>
    <a href="{{ url_for('admin.officers') }}" class="btn btn-outline">← Back to Officers</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('admin.edit_officer', officer_id=officer.officer_id) }}">

        <h3 class="section-heading">Officer Details</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Badge Number (read-only)</label>
                <input type="text" value="{{ officer.badge_number }}" disabled
                       style="background:#f4f6f9; color:#888;">
            </div>
            <div class="form-group">
                <label>Username (read-only)</label>
                <input type="text" value="{{ officer.username }}" disabled
                       style="background:#f4f6f9; color:#888;">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="full_name">Full Name *</label>
                <input type="text" id="full_name" name="full_name"
                       value="{{ officer.full_name }}" required>
            </div>
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email"
                       value="{{ officer.email }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone"
                       value="{{ officer.phone or '' }}"
                       placeholder="e.g. 0300-1234567">
            </div>
            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" id="department" name="department"
                       value="{{ officer.department or '' }}"
                       placeholder="e.g. Traffic Enforcement">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="precinct">Precinct</label>
                <input type="text" id="precinct" name="precinct"
                       value="{{ officer.precinct or '' }}"
                       placeholder="e.g. District South">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">✅ Save Changes</button>
            <a href="{{ url_for('admin.officers') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
